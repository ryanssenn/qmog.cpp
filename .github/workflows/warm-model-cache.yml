name: Warm model cache

# Download the pre-exported .mog from Hugging Face and save to Actions cache.
# CI restores from cache on each run; re-run this after publishing a new model revision.

on:
  workflow_dispatch:

env:
  HF_MOG_REPO: QmogAI/Mistral-7B-Q8F16
  MODEL_MOG: mistral-7B-Q8F16.mog

jobs:
  warm:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Get HF model revision
        id: hf-rev
        run: |
          python3 -m pip install -q huggingface_hub
          sha=$(python3 -c "from huggingface_hub import HfApi; print(HfApi().repo_info('${{ env.HF_MOG_REPO }}').sha)")
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Restore model cache
        id: model-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.MODEL_MOG }}
          key: mog-${{ steps.hf-rev.outputs.sha }}

      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: bash scripts/ci/prepare_model.sh

      - name: Save model cache
        if: steps.model-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.MODEL_MOG }}
          key: mog-${{ steps.hf-rev.outputs.sha }}

      - name: Verify
        run: |
          ls -lh "${{ env.MODEL_MOG }}"
          echo "Cache warm. CI will restore ${{ env.MODEL_MOG }} from cache (~2-5 min per run)."
