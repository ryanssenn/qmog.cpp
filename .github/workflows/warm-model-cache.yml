name: Warm model cache

# Download the pre-exported .mog from Hugging Face and save to Actions cache.
# CI restores from cache on each run; re-run this after publishing a new model revision.

on:
  workflow_dispatch:

env:
  HF_MOG_REPO: QmogAI/Mistral-7B-Q8F16
  MODEL_MOG: mistral-7B-Q8F16.mog

jobs:
  warm:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Get HF model file id
        id: hf-file
        run: |
          blob=$(curl -sf "https://huggingface.co/api/models/${{ env.HF_MOG_REPO }}/tree/main" \
            | python3 -c "import json,sys; files=json.load(sys.stdin); mog=next(f for f in files if f['path']=='${{ env.MODEL_MOG }}'); print(mog['lfs']['oid'])")
          echo "blob=$blob" >> "$GITHUB_OUTPUT"

      - name: Restore model cache
        id: model-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.MODEL_MOG }}
          key: mog-${{ steps.hf-file.outputs.blob }}

      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: bash scripts/ci/prepare_model.sh

      - name: Save model cache
        if: steps.model-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.MODEL_MOG }}
          key: mog-${{ steps.hf-file.outputs.blob }}

      - name: Verify
        run: |
          ls -lh "${{ env.MODEL_MOG }}"
          echo "Cache warm. CI will restore ${{ env.MODEL_MOG }} from cache (~2-5 min per run)."
